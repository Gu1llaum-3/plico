# plico configuration — copy to /etc/plico/config.toml and adapt.
# Secrets are referenced with ${ENV_VAR} and interpolated at load time;
# never write a token literally in this file (F20).

# Git worktrees live under /opt/docker/<stack>. They may be removed and
# recloned after Git corruption: never store irreplaceable mutable data here.
base_dir = "/opt/docker"

# Persistent deployment and schedule state. Back this file up.
state_file = "/var/lib/plico/state.json"

timezone = "Europe/Paris"

# How often each stack's git ref is checked for changes.
poll_interval = "60s"

# Optional deployment schedule (cron, 5 fields or @daily/@every 6h…),
# evaluated in `timezone`. Each firing opens a deployment window of
# `window`; during it, every poll tick may deploy — never outside it
# (tolerance: one poll_interval of ticker jitter at discovery). A fully
# missed window (daemon down, host paused) is logged and skipped, not
# replayed late. The schedule anchor is persisted in state.json: a
# restart inside a still-open window re-opens it, and editing the
# schedule re-anchors instead of replaying phantom firings. Without a
# schedule, a stack deploys as soon as a git delta is seen. Overridable
# per stack; a stack can opt out of a global schedule with
# schedule = "@poll". DST: a firing in the skipped hour does not run;
# in the repeated hour it runs once.
# schedule = "0 22 * * *"
# window = "2h"
# Out-of-window checks (F6): fetch + diff at every poll tick and notify
# "deployment queued" once per pending revision, without deploying.
# Overridable per stack; ignored for stacks without a schedule.
# check = true

# Hard ceiling for one full deployment run (git + hook + pull + up + verify).
run_timeout = "30m"

# How many stacks may deploy at the same time.
max_concurrent_deploys = 2

[log]
# path = "/var/log/plico/plico.log"   # empty = stderr; rotation via logrotate
level = "info"                        # debug | info | warn | error

[health]
# Semantic healthcheck endpoint (GET /healthz). Local by default.
listen = "127.0.0.1:9444"

[api]
# Volatile Unix socket for the client CLI. systemd creates /run/plico.
socket = "/run/plico/plico.sock"

# ── Notifications ───────────────────────────────────────────────────────
# Each channel takes an optional `events` list. Omitted = failure-oriented
# default: pre_hook_failed, pre_hook_skipped, deploy_failed, window_missed,
# git_sync_failed. Opt-in extras: deploy_success, deploy_queued,
# deploy_start. "all" = everything. A failing channel never breaks a
# deployment: the error is logged locally.

[ntfy]
# url = "https://ntfy.example.com/plico"
# token = "${PLICO_NTFY_TOKEN}"
# events = ["deploy_failed", "pre_hook_failed", "window_missed", "git_sync_failed", "deploy_success"]

# Generic JSON webhook (Google Chat / Teams accept the "text" field as-is);
# repeatable.
# [[webhook]]
# url = "https://chat.googleapis.com/v1/spaces/.../messages?key=..."
# events = ["all"]

# [smtp]
# host = "mail.example.com"
# port = 587
# from = "plico@example.com"
# to = ["ops@example.com"]
# username = "plico@example.com"
# password = "${PLICO_SMTP_PASSWORD}"
# events = ["deploy_failed", "window_missed", "git_sync_failed"]

# git_sync_failed fires after N consecutive git fetch failures for a stack
# (revoked token, moved repo). 0 disables. Default: 5.
# git_sync_alert_after = 5

[hooks]
# Global fallbacks; a hook versioned in the repo (.deploy/pre-deploy.sh)
# always takes priority. exit != 0 in pre-deploy = deployment aborted.
# pre_deploy_path = "/opt/plico/hooks/pre-deploy.sh"
# post_deploy_path = "/opt/plico/hooks/post-deploy.sh"
timeout = "10m"

# Git HTTPS credentials, one table per host. SSH remotes use the system agent.
# [git.auths."bitbucket.org"]
# username = "deploy-bot"
# password = "${PLICO_BITBUCKET_TOKEN}"

# [git.auths."gitea.example.com"]
# username = "plico"
# password = "${PLICO_GITEA_TOKEN}"

# ── Stacks ──────────────────────────────────────────────────────────────
[[stack]]
name = "webapp"                       # directory name AND compose project name
repo = "https://bitbucket.org/acme/webapp-deploy.git"
ref = "main"                          # branch to follow
compose_file = "docker-compose.yml"   # relative to the repo root
force_pull = true                     # run `compose pull` before `up`
# SOPS-encrypted dotenv files (repo-relative). Decrypted in memory via
# `sops exec-env`; compose interpolates ${VARS} from them. Never on disk.
sops_files = [".deploy/secrets.enc.env"]
sops_mode = "exec-env"                # or "tmpfs" (Linux only)
verify_timeout = "90s"                # post-up healthcheck budget
# hook_timeout = "20m"                # override [hooks].timeout per stack
# schedule = "0 4 * * *"              # override the global schedule (or "@poll")
# window = "30m"                      # override the global window

