[tools]
go = "1.26.5"
lefthook = "2.1.10"
golangci-lint = "2.12.2"
# Needed by the smoke test (and handy for operating plico stacks).
sops = "3.13.2"
age = "1.3.1"

[tasks.build]
description = "Build the plico binary"
run = "go build -trimpath -o bin/plico ./cmd/plico"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Format sources and run go vet"
run = ["gofmt -w .", "go vet ./..."]

[tasks.smoke]
description = "End-to-end smoke test (real git + docker + sops/age)"
depends = ["build"]
run = "./test/smoke.sh"
