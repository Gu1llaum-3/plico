[tools]
go = "1.26.5"
lefthook = "2.1.10"
golangci-lint = "2.12.2"
# Needed by the smoke test (and handy for operating plico stacks).
sops = "3.13.2"
age = "1.3.1"
goreleaser = "2.17.0"

[tasks.build]
description = "Build the plico binary for the local machine"
run = "go build -trimpath -o bin/plico ./cmd/plico"

[tasks.build-linux]
description = "Cross-compile static Linux release binaries (amd64 + arm64)"
run = [
  "CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags \"-s -w -X main.version=$(git describe --tags --always --dirty)\" -o bin/plico-linux-amd64 ./cmd/plico",
  "CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags \"-s -w -X main.version=$(git describe --tags --always --dirty)\" -o bin/plico-linux-arm64 ./cmd/plico",
]

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Format sources and run go vet"
run = ["gofmt -w .", "go vet ./..."]

[tasks.smoke]
description = "End-to-end smoke test (real git + docker + sops/age)"
depends = ["build"]
run = "./test/smoke.sh"

[tasks.release-snapshot]
description = "Local GoReleaser dry-run: builds all release artifacts into dist/"
run = "goreleaser release --snapshot --clean"
